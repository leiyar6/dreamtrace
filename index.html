<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#7B68EE" />
  <title>梦迹 DreamTrace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles/base.css" />
  <link rel="stylesheet" href="/styles/components.css" />
  <link rel="stylesheet" href="/styles/pages.css" />
</head>
<body>
  <!-- 手机外壳：模拟 iPhone 尺寸 390×844，灵动岛由 .phone-shell::before 伪元素绘制 -->
  <div class="phone-shell">
    <!-- 状态栏（iOS 风格：左时间 / 右信号+WiFi+电池） -->
    <div class="status-bar">
      <span class="status-time" id="statusTime">9:41</span>
      <span class="status-icons">
        <!-- 蜂窝信号：4 格递增柱 -->
        <svg class="sb-signal" viewBox="0 0 18 12" width="18" height="12" aria-hidden="true">
          <rect x="0" y="8" width="3" height="4" rx="0.8" fill="currentColor"/>
          <rect x="5" y="6" width="3" height="6" rx="0.8" fill="currentColor"/>
          <rect x="10" y="3" width="3" height="9" rx="0.8" fill="currentColor"/>
          <rect x="15" y="0" width="3" height="12" rx="0.8" fill="currentColor"/>
        </svg>
        <!-- WiFi：iOS 三片扇叶 + 底部圆点 -->
        <svg class="sb-wifi" viewBox="0 0 19 14" width="18" height="13" aria-hidden="true">
          <path fill="currentColor" d="M9.5 1.2c-3.3 0-6.4 1.3-8.7 3.4L2 6.1c1.9-1.7 4.6-2.7 7.5-2.7s5.6 1 7.5 2.7l1.2-1.5C15.9 2.5 12.8 1.2 9.5 1.2zm0 4.4c-2.1 0-4 .8-5.4 2.1l1.2 1.5C6.4 8.1 7.9 7.5 9.5 7.5s3.1.6 4.2 1.7l1.2-1.5C13.5 6.4 11.6 5.6 9.5 5.6zm0 4.4c-1 0-1.9.4-2.5 1l2.5 2.7 2.5-2.7c-.6-.6-1.5-1-2.5-1z"/>
        </svg>
        <!-- 电池：外壳描边 + 电量 + 正极凸起 -->
        <svg class="sb-battery" viewBox="0 0 28 13" width="27" height="13" aria-hidden="true">
          <rect x="0.5" y="0.5" width="24" height="12" rx="3.5" fill="none" stroke="currentColor" stroke-opacity="0.35"/>
          <rect x="2" y="2" width="21" height="9" rx="2" fill="currentColor"/>
          <rect x="25.5" y="4.5" width="2" height="4" rx="1" fill="currentColor" fill-opacity="0.4"/>
        </svg>
      </span>
    </div>

    <!-- 主内容容器（路由在此渲染） -->
    <main class="screen" id="app" aria-live="polite"></main>

    <!-- 底部导航 -->
    <nav class="bottom-nav" id="bottomNav" aria-label="主导航"></nav>

    <!-- 浮层挂载点：Toast / 弹窗 / 底部抽屉 -->
    <div class="overlay-root" id="overlayRoot" aria-live="polite"></div>
  </div>

  <!-- 桌面端外壳外的氛围背景 -->
  <div class="ambient" aria-hidden="true">
    <span class="blob blob-a"></span>
    <span class="blob blob-b"></span>
    <span class="blob blob-c"></span>
  </div>

  <script type="module" src="/scripts/app.js"></script>
</body>
</html>
